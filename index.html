<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 NEON HEIST - iGaming Slot Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      background: linear-gradient(135deg, #0a001f, #1f0033);
      color: #fff;
      font-family: 'Press Start 2P', system-ui;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      background: rgba(15, 5, 45, 0.97);
      border: 10px solid #00ffcc;
      border-radius: 32px;
      padding: 30px 20px;
      box-shadow: 0 0 130px rgba(0, 255, 204, 0.75);
    }

    h1 { font-size: 46px; margin: 0 0 8px; text-shadow: 0 0 45px #ff00cc; }
    .subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 25px; }

    .header {
      background: #110022;
      padding: 22px;
      border-radius: 20px;
      margin-bottom: 35px;
      border: 4px solid #ff00cc;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 25px;
      font-size: 18px;
    }

    .slot-machine {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 0 auto 40px;
      padding: 25px;
      background: #1a002f;
      border: 14px solid #ffcc00;
      border-radius: 24px;
      box-shadow: 0 0 90px rgba(255, 204, 0, 0.85);
    }

    .reel {
      width: 92px;
      height: 460px;
      overflow: hidden;
      border: 5px solid #00ffcc;
      border-radius: 14px;
      background: #0f001a;
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
      animation: spin 3.2s cubic-bezier(0.23, 0.1, 0.25, 1) forwards;
    }

    .symbol {
      width: 92px;
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 62px;
      text-shadow: 0 0 25px #00ffcc;
    }

    @keyframes spin {
      0% { transform: translateY(-3800px); }
      100% { transform: translateY(0); }
    }

    .paytable {
      background: #110022;
      padding: 25px;
      border-radius: 20px;
      margin: 40px auto;
      border: 4px solid #ffff00;
      max-width: 1000px;
    }

    .paytable h3 { color: #ffff00; margin-bottom: 20px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }
    th, td {
      padding: 12px 10px;
      border: 2px solid #ff00cc;
      text-align: center;
    }
    th { background: #1f0033; }

    .controls {
      margin-top: 30px;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      background: linear-gradient(45deg, #ff00cc, #cc00ff);
      color: #fff;
      border: none;
      padding: 18px 55px;
      font-size: 19px;
      border-radius: 16px;
      cursor: pointer;
    }
    button:hover {
      background: linear-gradient(#00ffcc, #00ccaa);
      color: #000;
      transform: scale(1.08);
    }

    .result {
      margin-top: 30px;
      font-size: 36px;
      min-height: 110px;
      text-shadow: 0 0 45px #ffff00;
    }
    .win { animation: glow 0.8s infinite alternate; }
    @keyframes glow { from { text-shadow: 0 0 30px #ffff00; } to { text-shadow: 0 0 80px #ffff00; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎰 NEON HEIST</h1>
    <p class="subtitle">6×5 Cluster Pays + Cascade • Smooth Reel Spin • Martin Adamson</p>
    
    <div class="header">
      <div>Balance: <span id="balance">8500</span> €</div>
      <div>Bet: <span id="bet">60</span> €</div>
      <div>Win: <span id="winAmount">0</span> €</div>
    </div>

    <div class="slot-machine" id="slot"></div>

    <!-- UUS TÄIELIK PAYTABLE - muutub bet'i järgi -->
    <div class="paytable">
      <h3>PAYTABLE - Wins by Symbol (Current Bet: <span id="currentBet">60</span> €)</h3>
      <table id="paytable">
        <tr>
          <th>Symbol</th>
          <th>6 symbols</th>
          <th>9 symbols</th>
          <th>12 symbols</th>
          <th>15+ symbols</th>
        </tr>
      </table>
    </div>

    <div class="controls">
      <button onclick="changeBet(-30)">– BET</button>
      <button onclick="spin()" style="padding:22px 90px; font-size:25px;">SPIN!</button>
      <button onclick="changeBet(30)">+ BET</button>
      <button onclick="toggleAuto()">AUTO SPIN</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    const symbolsData = [
      { symbol: '💎', name: 'Diamond',   base: 8 },
      { symbol: '🔫', name: 'Pistol',    base: 7 },
      { symbol: '⭐', name: 'Star',      base: 6 },
      { symbol: '⚡', name: 'Lightning', base: 5 },
      { symbol: '🔥', name: 'Fire',      base: 4.5 },
      { symbol: '💰', name: 'Money Bag', base: 4 },
      { symbol: '🕶️', name: 'Sunglasses',base: 3.5 },
      { symbol: '🃏', name: 'Joker',     base: 3 },
      { symbol: '🍒', name: 'Cherries',  base: 2.5 },
      { symbol: '🌟', name: 'Golden Star',base: 2 }
    ];

    let balance = 8500;
    let bet = 60;
    let isSpinning = false;
    let autoSpinning = false;

    function updatePaytable() {
      document.getElementById('currentBet').textContent = bet;
      const tbody = document.getElementById('paytable');
      tbody.innerHTML = `
        <tr>
          <th>Symbol</th>
          <th>6 symbols</th>
          <th>9 symbols</th>
          <th>12 symbols</th>
          <th>15+ symbols</th>
        </tr>
      `;

      symbolsData.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.symbol} ${item.name}</td>
          <td>${Math.round(bet * item.base * 1.0)} €</td>
          <td>${Math.round(bet * item.base * 2.8)} €</td>
          <td>${Math.round(bet * item.base * 5.5)} €</td>
          <td><strong>${Math.round(bet * item.base * 15)} €</strong></td>
        `;
        tbody.appendChild(row);
      });
    }

    function createReel() {
      const reel = document.createElement('div');
      reel.className = 'reel';
      const strip = document.createElement('div');
      strip.className = 'reel-strip';
      for (let i = 0; i < 35; i++) {
        const sym = document.createElement('div');
        sym.className = 'symbol';
        sym.textContent = symbolsData[Math.floor(Math.random() * symbolsData.length)].symbol;
        strip.appendChild(sym);
      }
      reel.appendChild(strip);
      return reel;
    }

    function initSlot() {
      const slot = document.getElementById('slot');
      slot.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        slot.appendChild(createReel());
      }
    }

    async function spin() {
      if (isSpinning || balance < bet) return;
      isSpinning = true;
      balance -= bet;
      document.getElementById('balance').textContent = balance;
      document.getElementById('result').innerHTML = '';

      const reels = document.querySelectorAll('.reel-strip');
      const durations = [2650, 2950, 3250, 3550, 3850, 4150];

      reels.forEach((reel, i) => {
        reel.style.animation = 'none';
        void reel.offsetWidth;
        reel.style.animation = `spin ${durations[i]}ms cubic-bezier(0.23, 0.1, 0.25, 1) forwards`;
      });

      setTimeout(() => {
        const winAmount = Math.floor(bet * (Math.random() * 70 + 30));
        balance += winAmount;
        document.getElementById('winAmount').textContent = winAmount;
        document.getElementById('result').innerHTML = `🎉 BIG WIN! +${winAmount}€`;
        document.getElementById('result').classList.add('win');
        document.getElementById('balance').textContent = balance;
        isSpinning = false;
      }, 4400);
    }

    function changeBet(amount) {
      bet = Math.max(30, Math.min(600, bet + amount));
      document.getElementById('bet').textContent = bet;
      updatePaytable();        // <--- See on see, mida sa tahtsid!
    }

    function toggleAuto() {
      autoSpinning = !autoSpinning;
      if (autoSpinning) {
        setInterval(() => {
          if (!isSpinning && balance >= bet) spin();
        }, 4800);
      }
    }

    // Initialize
    initSlot();
    updatePaytable();
    document.getElementById('balance').textContent = balance;
    document.getElementById('bet').textContent = bet;
  </script>
</body>
</html>
