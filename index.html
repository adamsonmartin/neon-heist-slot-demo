<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 NEON HEIST - Pro Slot Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      background: linear-gradient(135deg, #0a001f, #1f0033);
      color: #fff;
      font-family: 'Press Start 2P', system-ui;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(15, 5, 45, 0.97);
      border: 12px solid #00ffcc;
      border-radius: 35px;
      padding: 35px 25px;
      box-shadow: 0 0 140px rgba(0, 255, 204, 0.8);
    }

    h1 { font-size: 48px; margin: 0 0 10px; text-shadow: 0 0 50px #ff00cc; }
    .subtitle { font-size: 15px; opacity: 0.85; margin-bottom: 25px; }

    .info-bar {
      background: #110022;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 30px;
      border: 3px solid #ff00cc;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 15px;
    }

    .slot-wrapper {
      position: relative;
      margin: 0 auto 35px;
      max-width: fit-content;
    }

    .slot-machine {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 28px;
      background: #1a002f;
      border: 16px solid #ffcc00;
      border-radius: 26px;
      box-shadow: 0 0 100px rgba(255, 204, 0, 0.9);
    }

    .reel {
      width: 96px;
      height: 480px;
      overflow: hidden;
      border: 6px solid #00ffcc;
      border-radius: 16px;
      background: #0f001a;
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
      animation: spin 3.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    .symbol {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 66px;
      text-shadow: 0 0 30px #00ffcc;
    }

    @keyframes spin {
      0% { transform: translateY(-4200px); }
      100% { transform: translateY(0); }
    }

    #bigWin {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 72px;
      font-weight: bold;
      color: #ffff00;
      text-shadow: 0 0 60px #ffff00, 0 0 110px #ff00cc;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      white-space: nowrap;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      background: linear-gradient(45deg, #ff00cc, #cc00ff);
      color: #fff;
      border: none;
      padding: 18px 65px;
      font-size: 21px;
      border-radius: 16px;
      cursor: pointer;
      min-width: 180px;
    }
    button:hover {
      background: linear-gradient(#00ffcc, #00ccaa);
      color: #000;
      transform: scale(1.08);
    }

    .paytable {
      background: #110022;
      padding: 25px;
      border-radius: 20px;
      margin-top: 40px;
      border: 4px solid #ffff00;
    }

    table { width: 100%; border-collapse: collapse; font-size: 15px; }
    th, td { padding: 12px 10px; border: 2px solid #ff00cc; text-align: center; }
    th { background: #1f0033; color: #ffff00; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎰 NEON HEIST</h1>
    <p class="subtitle">6×5 Cluster Pays + Cascade • Professional Demo • Martin Adamson</p>

    <div class="info-bar">
      <div>RTP: <strong>96.2%</strong></div>
      <div>Hit Rate: <strong>32%</strong></div>
      <div>Volatility: <strong>High</strong></div>
      <div>Max Win: <strong>×150</strong></div>
    </div>

    <div class="slot-wrapper">
      <div class="slot-machine" id="slot">
        <div id="bigWin">MEGA WIN!</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="changeBet(-30)">– BET</button>
      <button onclick="spin()" style="padding:22px 110px; font-size:26px;">SPIN!</button>
      <button onclick="changeBet(30)">+ BET</button>
      <button onclick="toggleAuto()">AUTO SPIN</button>
    </div>

    <div class="paytable">
      <h3>PAYTABLE - Win per Symbol (Bet: <span id="currentBet">60</span> €)</h3>
      <table id="paytable"></table>
    </div>
  </div>

  <script>
    const paytableData = [
      { sym: "💎", name: "Diamond",     v6: 8, v9: 22, v12: 48, v15: 160 },
      { sym: "🔫", name: "Pistol",      v6: 7, v9: 19, v12: 42, v15: 140 },
      { sym: "⭐", name: "Star",        v6: 6, v9: 16, v12: 35, v15: 115 },
      { sym: "⚡", name: "Lightning",   v6: 5, v9: 14, v12: 30, v15: 95 },
      { sym: "🔥", name: "Fire",        v6: 4.5, v9: 12, v12: 26, v15: 80 },
      { sym: "💰", name: "Money Bag",   v6: 4, v9: 10, v12: 22, v15: 70 },
      { sym: "🕶️", name: "Sunglasses", v6: 3.5, v9: 9, v12: 19, v15: 60 },
      { sym: "🃏", name: "Joker",       v6: 3, v9: 8, v12: 17, v15: 52 },
      { sym: "🍒", name: "Cherries",    v6: 2.5, v9: 6.5, v12: 14, v15: 42 },
      { sym: "🌟", name: "Golden Star", v6: 2, v9: 5, v12: 11, v15: 35 }
    ];

    let balance = 8500;
    let bet = 60;
    let isSpinning = false;
    let autoSpinning = false;

    function updatePaytable() {
      document.getElementById("currentBet").textContent = bet;
      let html = `<tr><th>Symbol</th><th>6</th><th>9</th><th>12</th><th>15+</th></tr>`;

      paytableData.forEach(item => {
        html += `
          <tr>
            <td style="font-size:28px;">${item.sym} ${item.name}</td>
            <td>${Math.round(bet * item.v6)} €</td>
            <td>${Math.round(bet * item.v9)} €</td>
            <td>${Math.round(bet * item.v12)} €</td>
            <td><strong>${Math.round(bet * item.v15)} €</strong></td>
          </tr>`;
      });
      document.getElementById("paytable").innerHTML = html;
    }

    function createReel() {
      const reel = document.createElement('div');
      reel.className = 'reel';
      const strip = document.createElement('div');
      strip.className = 'reel-strip';
      for (let i = 0; i < 40; i++) {
        const sym = document.createElement('div');
        sym.className = 'symbol';
        sym.textContent = paytableData[Math.floor(Math.random() * paytableData.length)].sym;
        strip.appendChild(sym);
      }
      reel.appendChild(strip);
      return reel;
    }

    function initSlot() {
      const slot = document.getElementById('slot');
      slot.innerHTML = '<div id="bigWin">MEGA WIN!</div>';
      for (let i = 0; i < 6; i++) slot.appendChild(createReel());
    }

    async function spin() {
      if (isSpinning || balance < bet) return;
      isSpinning = true;
      balance -= bet;
      document.getElementById('balance').textContent = balance;

      const reels = document.querySelectorAll('.reel-strip');
      const durations = [2600, 2900, 3200, 3500, 3800, 4100];

      reels.forEach((reel, i) => {
        reel.style.animation = 'none';
        void reel.offsetWidth;
        reel.style.animation = `spin ${durations[i]}ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards`;
      });

      setTimeout(() => {
        const rand = Math.random();
        let winAmount = 0;
        let winLevel = "";

        if (rand < 0.38) {
          winLevel = "NO WIN";
        } else if (rand < 0.68) {
          winAmount = Math.floor(bet * (Math.random() * 8 + 3));
          winLevel = "WIN";
        } else if (rand < 0.88) {
          winAmount = Math.floor(bet * (Math.random() * 25 + 12));
          winLevel = "BIG WIN";
        } else if (rand < 0.97) {
          winAmount = Math.floor(bet * (Math.random() * 60 + 35));
          winLevel = "BIG WIN";
        } else {
          winAmount = Math.floor(bet * (Math.random() * 140 + 80));
          winLevel = "MEGA WIN";
        }

        if (winAmount > 0) {
          const bigWin = document.getElementById('bigWin');
          bigWin.textContent = winLevel;
          bigWin.style.opacity = '1';
          bigWin.style.transform = 'translate(-50%, -50%) scale(1.4)';

          setTimeout(() => {
            bigWin.style.opacity = '0';
            bigWin.style.transform = 'translate(-50%, -50%) scale(0.8)';
          }, 2200);
        }

        document.getElementById('balance').textContent = balance + winAmount;
        isSpinning = false;
      }, 4300);
    }

    function changeBet(amount) {
      bet = Math.max(30, Math.min(600, bet + amount));
      document.getElementById('bet').textContent = bet;
      updatePaytable();
    }

    function toggleAuto() {
      autoSpinning = !autoSpinning;
      if (autoSpinning) setInterval(() => { if (!isSpinning && balance >= bet) spin(); }, 4600);
    }

    initSlot();
    updatePaytable();
    document.getElementById('balance').textContent = balance;
    document.getElementById('bet').textContent = bet;
  </script>
</body>
</html>
