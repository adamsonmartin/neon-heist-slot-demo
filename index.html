<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 NEON HEIST - iGaming Slot Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      background: linear-gradient(135deg, #0a001f, #1f0033);
      color: #fff;
      font-family: 'Press Start 2P', system-ui;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(15, 5, 45, 0.97);
      border: 10px solid #00ffcc;
      border-radius: 32px;
      padding: 30px 20px;
      box-shadow: 0 0 130px rgba(0, 255, 204, 0.75);
    }

    h1 { font-size: 48px; margin: 0 0 8px; text-shadow: 0 0 45px #ff00cc; }
    .subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 25px; }

    .header {
      background: #110022;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 4px solid #ff00cc;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 25px;
      font-size: 18px;
    }

    .slot-wrapper {
      position: relative;
      margin: 0 auto 35px;
      max-width: fit-content;
    }

    .slot-machine {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 25px;
      background: #1a002f;
      border: 14px solid #ffcc00;
      border-radius: 24px;
      box-shadow: 0 0 90px rgba(255, 204, 0, 0.85);
    }

    .reel {
      width: 92px;
      height: 460px;
      overflow: hidden;
      border: 5px solid #00ffcc;
      border-radius: 14px;
      background: #0f001a;
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
      animation: spin 3.2s cubic-bezier(0.23, 0.1, 0.25, 1) forwards;
    }

    .symbol {
      width: 92px;
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 62px;
      text-shadow: 0 0 25px #00ffcc;
    }

    @keyframes spin {
      0% { transform: translateY(-3800px); }
      100% { transform: translateY(0); }
    }

    /* Big Win - keskel slot'i */
    #bigWin {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 62px;
      font-weight: bold;
      color: #ffff00;
      text-shadow: 0 0 40px #ffff00, 0 0 90px #ff00cc;
      pointer-events: none;
      opacity: 0;
      z-index: 30;
      white-space: nowrap;
      transition: all 0.4s ease-out;
    }

    .paytable {
      background: #110022;
      padding: 25px;
      border-radius: 20px;
      margin: 40px auto;
      border: 4px solid #ffff00;
      max-width: 1050px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 15px; }
    th, td { padding: 12px 10px; border: 2px solid #ff00cc; text-align: center; }
    th { background: #1f0033; color: #ffff00; }

    .controls {
      margin-top: 15px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      background: linear-gradient(45deg, #ff00cc, #cc00ff);
      color: #fff;
      border: none;
      padding: 18px 60px;
      font-size: 20px;
      border-radius: 16px;
      cursor: pointer;
      min-width: 160px;
    }
    button:hover {
      background: linear-gradient(#00ffcc, #00ccaa);
      color: #000;
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎰 NEON HEIST</h1>
    <p class="subtitle">6×5 Cluster Pays + Cascade • Smooth Reel Spin • Martin Adamson</p>
    
    <div class="header">
      <div>Balance: <span id="balance">8500</span> €</div>
      <div>Bet: <span id="bet">60</span> €</div>
      <div>Win: <span id="winAmount">0</span> €</div>
    </div>

    <div class="slot-wrapper">
      <div class="slot-machine" id="slot">
        <div id="bigWin">BIG WIN!</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="changeBet(-30)">– BET</button>
      <button onclick="spin()" style="padding:22px 100px; font-size:26px;">SPIN!</button>
      <button onclick="changeBet(30)">+ BET</button>
      <button onclick="toggleAuto()">AUTO SPIN</button>
    </div>

    <div class="paytable">
      <h3>PAYTABLE - Win per Symbol (Bet: <span id="currentBet">60</span> €)</h3>
      <table id="paytable"></table>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    const paytableData = [
      { sym: "💎", name: "Diamond",     v6: 8,   v9: 22,  v12: 48,  v15: 160 },
      { sym: "🔫", name: "Pistol",      v6: 7,   v9: 19,  v12: 42,  v15: 140 },
      { sym: "⭐", name: "Star",        v6: 6,   v9: 16,  v12: 35,  v15: 115 },
      { sym: "⚡", name: "Lightning",   v6: 5,   v9: 14,  v12: 30,  v15: 95  },
      { sym: "🔥", name: "Fire",        v6: 4.5, v9: 12,  v12: 26,  v15: 80  },
      { sym: "💰", name: "Money Bag",   v6: 4,   v9: 10,  v12: 22,  v15: 70  },
      { sym: "🕶️", name: "Sunglasses", v6: 3.5, v9: 9,   v12: 19,  v15: 60  },
      { sym: "🃏", name: "Joker",       v6: 3,   v9: 8,   v12: 17,  v15: 52  },
      { sym: "🍒", name: "Cherries",    v6: 2.5, v9: 6.5, v12: 14,  v15: 42  },
      { sym: "🌟", name: "Golden Star", v6: 2,   v9: 5,   v12: 11,  v15: 35  }
    ];

    let balance = 8500;
    let bet = 60;
    let isSpinning = false;
    let autoSpinning = false;

    function updatePaytable() {
      document.getElementById("currentBet").textContent = bet;
      let html = `<tr><th>Symbol</th><th>6 symbols</th><th>9 symbols</th><th>12 symbols</th><th>15+ symbols</th></tr>`;

      paytableData.forEach(item => {
        html += `
          <tr>
            <td style="font-size:28px;">${item.sym} ${item.name}</td>
            <td>${Math.round(bet * item.v6)} €</td>
            <td>${Math.round(bet * item.v9)} €</td>
            <td>${Math.round(bet * item.v12)} €</td>
            <td><strong>${Math.round(bet * item.v15)} €</strong></td>
          </tr>`;
      });
      document.getElementById("paytable").innerHTML = html;
    }

    function createReel() {
      const reel = document.createElement('div');
      reel.className = 'reel';
      const strip = document.createElement('div');
      strip.className = 'reel-strip';
      for (let i = 0; i < 35; i++) {
        const sym = document.createElement('div');
        sym.className = 'symbol';
        sym.textContent = paytableData[Math.floor(Math.random() * paytableData.length)].sym;
        strip.appendChild(sym);
      }
      reel.appendChild(strip);
      return reel;
    }

    function initSlot() {
      const slot = document.getElementById('slot');
      slot.innerHTML = '<div id="bigWin">BIG WIN!</div>';
      for (let i = 0; i < 6; i++) {
        slot.appendChild(createReel());
      }
    }

    async function spin() {
      if (isSpinning || balance < bet) return;
      isSpinning = true;
      balance -= bet;
      document.getElementById('balance').textContent = balance;

      const reels = document.querySelectorAll('.reel-strip');
      const durations = [2650, 2950, 3250, 3550, 3850, 4150];

      reels.forEach((reel, i) => {
        reel.style.animation = 'none';
        void reel.offsetWidth;
        reel.style.animation = `spin ${durations[i]}ms cubic-bezier(0.23, 0.1, 0.25, 1) forwards`;
      });

      setTimeout(() => {
        const winAmount = Math.floor(bet * (Math.random() * 85 + 45));
        balance += winAmount;
        document.getElementById('winAmount').textContent = winAmount;

        const bigWin = document.getElementById('bigWin');
        bigWin.textContent = `+${winAmount}€`;
        bigWin.style.opacity = '1';
        bigWin.style.transform = 'translate(-50%, -50%) scale(1.35)';

        setTimeout(() => {
          bigWin.style.opacity = '0';
          bigWin.style.transform = 'translate(-50%, -50%) scale(0.7)';
        }, 2200);

        document.getElementById('result').innerHTML = `🎉 BIG WIN! +${winAmount}€`;
        document.getElementById('result').classList.add('win');
        document.getElementById('balance').textContent = balance;
        isSpinning = false;
      }, 4400);
    }

    function changeBet(amount) {
      bet = Math.max(30, Math.min(600, bet + amount));
      document.getElementById('bet').textContent = bet;
      updatePaytable();
    }

    function toggleAuto() {
      autoSpinning = !autoSpinning;
      if (autoSpinning) {
        setInterval(() => { if (!isSpinning && balance >= bet) spin(); }, 4800);
      }
    }

    // Init
    initSlot();
    updatePaytable();
    document.getElementById('balance').textContent = balance;
    document.getElementById('bet').textContent = bet;
  </script>
</body>
</html>
