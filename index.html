<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 NEON HEIST - Pro Slot Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { margin:0; background:linear-gradient(135deg,#0a001f,#1f0033); color:#fff; font-family:'Press Start 2P',system-ui; text-align:center; padding:20px; min-height:100vh; }
    .container { max-width:1180px; margin:0 auto; background:rgba(15,5,45,0.97); border:10px solid #00ffcc; border-radius:32px; padding:30px 20px; box-shadow:0 0 130px rgba(0,255,204,0.75); }
    h1 { font-size:46px; margin:0 0 8px; text-shadow:0 0 45px #ff00cc; }
    .subtitle { font-size:13px; opacity:0.8; margin-bottom:25px; letter-spacing:0.05em; }

    .header { background:#110022; padding:20px; border-radius:20px; margin-bottom:20px; border:4px solid #ff00cc; display:flex; justify-content:space-around; flex-wrap:wrap; gap:25px; font-size:16px; }
    .header-item { display:flex; flex-direction:column; gap:6px; }
    .header-label { font-size:10px; color:#888; }
    .header-val { font-size:20px; }
    .header-val.green { color:#00ff88; }
    .header-val.yellow { color:#ffff00; }

    .slot-container { position:relative; margin:0 auto 25px; max-width:fit-content; }
    .slot-machine { display:flex; gap:10px; justify-content:center; padding:25px; background:#1a002f; border:14px solid #ffcc00; border-radius:24px; box-shadow:0 0 90px rgba(255,204,0,0.85); }

    .reel { width:92px; height:368px; overflow:hidden; border:5px solid #00ffcc; border-radius:14px; background:#0f001a; position:relative; }
    .reel::before, .reel::after { content:''; position:absolute; left:0; right:0; height:60px; z-index:2; pointer-events:none; }
    .reel::before { top:0; background:linear-gradient(#0f001a,transparent); }
    .reel::after { bottom:0; background:linear-gradient(transparent,#0f001a); }
    .reel-inner { display:flex; flex-direction:column; transition:transform 0.05s linear; }
    .symbol { width:92px; height:92px; display:flex; align-items:center; justify-content:center; font-size:58px; flex-shrink:0; }

    #bigWin {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.6);
      font-size:58px; color:#ffff00; text-shadow:0 0 40px #ffff00, 0 0 90px #ff00cc;
      pointer-events:none; opacity:0; z-index:30; white-space:nowrap;
      transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }

    .controls {
      display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:20px 0 30px 0; align-items:center;
    }
    .ctrl-btn {
      background:transparent; color:#00ffcc; border:3px solid #00ffcc; padding:14px 28px;
      font-size:16px; border-radius:12px; cursor:pointer; font-family:'Press Start 2P',system-ui;
    }
    .ctrl-btn:hover { background:#00ffcc; color:#000; }

    .spin-btn {
      background:linear-gradient(45deg,#ff00cc,#cc00ff); color:#fff; border:none;
      padding:20px 90px; font-size:26px; border-radius:16px; cursor:pointer; box-shadow:0 0 30px rgba(255,0,204,0.6);
    }
    .spin-btn:hover { transform:scale(1.05); box-shadow:0 0 50px rgba(255,0,204,0.9); }

    .paytable {
      background:#110022; padding:25px; border-radius:20px; margin:0 auto; border:4px solid #ffff00; max-width:1050px;
    }
    .paytable h3 { font-size:14px; margin-bottom:16px; color:#ffff00; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { padding:10px 8px; border:2px solid #ff00cc; text-align:center; }
    th { background:#1f0033; color:#ffff00; font-size:12px; }
    td:first-child { text-align:left; font-size:14px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎰 NEON HEIST</h1>
  <p class="subtitle">6 REELS · 5 ROWS · CLUSTER PAYS · RTP 96.5% · Martin Adamson</p>

  <div class="header">
    <div class="header-item"><div class="header-label">BALANCE</div><div class="header-val green" id="balance">8500 €</div></div>
    <div class="header-item"><div class="header-label">BET</div><div class="header-val" id="bet-display">60 €</div></div>
    <div class="header-item"><div class="header-label">LAST WIN</div><div class="header-val yellow" id="winAmount">0 €</div></div>
    <div class="header-item"><div class="header-label">TOTAL WON</div><div class="header-val yellow" id="totalWon">0 €</div></div>
    <div class="header-item"><div class="header-label">SPINS</div><div class="header-val" id="spinCount">0</div></div>
  </div>

  <div class="slot-container">
    <div class="slot-machine" id="slot"></div>
    <div id="bigWin">BIG WIN!</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="changeBet(-30)">– BET</button>
    <button class="spin-btn" onclick="doSpin()">SPIN!</button>
    <button class="ctrl-btn" onclick="changeBet(30)">+ BET</button>
    <button class="ctrl-btn" id="auto-btn" onclick="toggleAuto()">AUTO</button>
  </div>

  <div class="paytable">
    <h3>PAYTABLE — Win per Symbol (Bet: <span id="currentBet">60</span> €)</h3>
    <table id="paytable"></table>
  </div>
</div>

<script>
const paytableData = [
  { sym:"💎", name:"Diamond",     v6:8,   v9:22,  v12:48,  v15:160 },
  { sym:"🔫", name:"Pistol",      v6:7,   v9:19,  v12:42,  v15:140 },
  { sym:"⭐", name:"Star",        v6:6,   v9:16,  v12:35,  v15:115 },
  { sym:"⚡", name:"Lightning",   v6:5,   v9:14,  v12:30,  v15:95  },
  { sym:"🔥", name:"Fire",        v6:4.5, v9:12,  v12:26,  v15:80  },
  { sym:"💰", name:"Money Bag",   v6:4,   v9:10,  v12:22,  v15:70  },
  { sym:"🕶️",name:"Sunglasses",  v6:3.5, v9:9,   v12:19,  v15:60  },
  { sym:"🃏", name:"Joker",       v6:3,   v9:8,   v12:17,  v15:52  },
  { sym:"🍒", name:"Cherries",    v6:2.5, v9:6.5, v12:14,  v15:42  },
  { sym:"🌟", name:"Golden Star", v6:2,   v9:5,   v12:11,  v15:35  }
];

let balance = 8500, bet = 60, totalWon = 0, spinCount = 0;
let isSpinning = false, autoSpinning = false;

function fmt(n) { return n.toLocaleString() + ' €'; }

function updatePaytable() {
  document.getElementById("currentBet").textContent = bet;
  document.getElementById("bet-display").textContent = bet + ' €';
  let html = '<tr><th>Symbol</th><th>6 symbols</th><th>9 symbols</th><th>12 symbols</th><th>15+ symbols</th></tr>';
  paytableData.forEach(item => {
    html += `<tr><td>${item.sym} ${item.name}</td>
      <td>${Math.round(bet * item.v6)} €</td>
      <td>${Math.round(bet * item.v9)} €</td>
      <td>${Math.round(bet * item.v12)} €</td>
      <td><strong>${Math.round(bet * item.v15)} €</strong></td></tr>`;
  });
  document.getElementById("paytable").innerHTML = html;
}

function initSlot() {
  const slot = document.getElementById('slot');
  slot.innerHTML = '<div id="bigWin">BIG WIN!</div>';
  for (let c = 0; c < 6; c++) {
    const reel = document.createElement('div');
    reel.className = 'reel';
    const inner = document.createElement('div');
    inner.className = 'reel-inner';
    for (let r = 0; r < 5; r++) {
      const sym = document.createElement('div');
      sym.className = 'symbol';
      sym.textContent = paytableData[Math.floor(Math.random()*paytableData.length)].sym;
      inner.appendChild(sym);
    }
    reel.appendChild(inner);
    slot.appendChild(reel);
  }
}

async function doSpin() {
  if (isSpinning || balance < bet) return;
  isSpinning = true;
  balance -= bet;
  spinCount++;
  document.getElementById('balance').textContent = fmt(balance);
  document.getElementById('spinCount').textContent = spinCount;
  document.getElementById('winAmount').textContent = '0 €';

  const reels = document.querySelectorAll('.reel-inner');
  reels.forEach((reel, i) => {
    reel.style.transition = 'none';
    reel.style.transform = 'translateY(-2000px)';
    void reel.offsetWidth;
    reel.style.transition = `transform ${2.4 + i*0.3}s cubic-bezier(0.25, 0.1, 0.25, 1)`;
    reel.style.transform = 'translateY(0)';
  });

  setTimeout(() => {
    const winAmount = Math.floor(bet * (Math.random() * 85 + 35));
    balance += winAmount;
    totalWon += winAmount;

    document.getElementById('balance').textContent = fmt(balance);
    document.getElementById('winAmount').textContent = fmt(winAmount);
    document.getElementById('totalWon').textContent = fmt(totalWon);

    const bigWin = document.getElementById('bigWin');
    bigWin.textContent = winAmount > bet * 50 ? "MEGA WIN!" : "BIG WIN!";
    bigWin.style.opacity = '1';
    bigWin.style.transform = 'translate(-50%, -50%) scale(1.3)';

    setTimeout(() => {
      bigWin.style.opacity = '0';
      bigWin.style.transform = 'translate(-50%, -50%) scale(0.6)';
    }, 2200);

    isSpinning = false;
  }, 3200);
}

function changeBet(amount) {
  if (isSpinning) return;
  bet = Math.max(30, Math.min(600, bet + amount));
  document.getElementById('bet-display').textContent = bet + ' €';
  updatePaytable();
}

function toggleAuto() {
  autoSpinning = !autoSpinning;
  const btn = document.getElementById('auto-btn');
  btn.classList.toggle('active', autoSpinning);
  if (autoSpinning) {
    const interval = setInterval(() => {
      if (!isSpinning && balance >= bet) doSpin();
    }, 2500);
  }
}

initSlot();
updatePaytable();
</script>
</body>
</html>
